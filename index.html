<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jesse Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0f14; color: #e8eaf0; min-height: 100vh; }

  .gateway { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 3rem; }

  /* ── 시계 ── */
  .clock-layer { text-align: center; margin-bottom: 1.8rem; }
  #clock-line { display: flex; align-items: baseline; justify-content: center; gap: 18px; }
  #clock-date { font-size: 22px; font-weight: 300; color: #b0b8d0; letter-spacing: 1px; }
  #clock-time { font-size: 52px; font-weight: 400; color: #fff; letter-spacing: 4px; font-family: 'Orbitron', sans-serif; }

  /* ── 검색 ── */
  .search-layer { display: flex; align-items: center; gap: 8px; max-width: 700px; margin: 0 auto 1.8rem; }
  .search-layer input { flex: 1; height: 48px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.12); background: rgba(22,25,38,0.97); padding: 0 22px; font-size: 15px; color: #e8eaf0; outline: none; }
  .search-layer input::placeholder { color: #556; }
  .search-layer input:focus { border-color: #4285F4; box-shadow: 0 0 0 3px rgba(66,133,244,0.18); }
  .btn-search { height: 48px; width: 116px; border-radius: 24px; cursor: pointer; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 7px; white-space: nowrap; transition: all 0.18s; border: none; flex-shrink: 0; }
  .btn-naver { background: #03C75A; color: #fff; box-shadow: 0 2px 14px rgba(3,199,90,0.35); }
  .btn-naver:hover { background: #02b050; box-shadow: 0 4px 20px rgba(3,199,90,0.5); transform: translateY(-1px); }
  .btn-google { background: #fff; color: #3c4043; box-shadow: 0 2px 14px rgba(255,255,255,0.15); }
  .btn-google:hover { background: #f1f3f4; box-shadow: 0 4px 20px rgba(255,255,255,0.25); transform: translateY(-1px); }
  .google-dots { display: flex; gap: 2px; }
  .google-dots span { width: 7px; height: 7px; border-radius: 50%; display: block; }
  .gd1{background:#4285F4;} .gd2{background:#EA4335;} .gd3{background:#FBBC05;} .gd4{background:#34A853;}

  /* ── 바로가기 ── */
  .shortcuts-layer { background: rgba(22,25,38,0.97); border-radius: 16px; padding: 1rem 1.25rem; border: 1px solid rgba(255,255,255,0.07); margin-bottom: 1.6rem; }
  .shortcuts-grid { display: flex; flex-wrap: nowrap; gap: 8px; justify-content: center; align-items: flex-start; overflow-x: auto; }
  .shortcuts-grid::-webkit-scrollbar { height: 0; }

  .shortcut-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; min-width: 72px; flex-shrink: 0; padding-top: 10px; }
  .shortcut-wrap { position: relative; width: 56px; height: 56px; }
  .shortcut-icon { width: 56px; height: 56px; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); display: block; transition: box-shadow 0.15s; }
  .shortcut-icon svg, .shortcut-icon img { width: 100%; height: 100%; display: block; object-fit: cover; }
  .shortcut-item:hover .shortcut-icon { box-shadow: 0 0 0 2.5px rgba(255,255,255,0.3); }
  .shortcut-label { font-size: 11px; color: #8890aa; text-align: center; max-width: 68px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .del-btn { display: none; position: absolute; top: -7px; right: -7px; width: 18px; height: 18px; border-radius: 50%; background: #e03e3e; color: #fff; font-size: 10px; font-weight: 700; border: 1.5px solid #0d0f14; cursor: pointer; align-items: center; justify-content: center; z-index: 2; padding: 0; line-height: 1; }
  .shortcut-item:hover .del-btn { display: flex; }
  .del-btn:hover { background: #c02020; }
  .shortcut-add .shortcut-icon { background: rgba(34,37,58,0.6); border-style: dashed; border-color: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
  .shortcut-add-plus { font-size: 24px; color: #555; }

  /* ── 하단 레이아웃 ── */
  .bottom-col { display: flex; flex-direction: column; gap: 16px; }

  /* ── 날씨 ── */
  .weather-layer { background: rgba(22,25,38,0.97); border-radius: 16px; padding: 1.1rem 1.25rem; border: 1px solid rgba(255,255,255,0.07); }
  .weather-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
  .weather-scroll::-webkit-scrollbar { height: 4px; }
  .weather-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  .wx-card { display: flex; flex-direction: column; align-items: center; gap: 0; background: rgba(255,255,255,0.04); border-radius: 14px; padding: 12px 10px 10px; min-width: 90px; flex: 1; border: 1px solid rgba(255,255,255,0.05); }
  .wx-card.today { background: rgba(66,133,244,0.13); border-color: rgba(66,133,244,0.28); }
  .wx-card .wx-label { font-size: 12px; font-weight: 700; color: #8890aa; margin-bottom: 1px; }
  .wx-card .wx-date  { font-size: 11px; color: #445; margin-bottom: 8px; }
  .wx-card .wx-emoji { font-size: 38px; line-height: 1; margin-bottom: 8px; }
  .wx-card .wx-temp-hi { font-size: 17px; font-weight: 700; color: #f0c060; }
  .wx-card .wx-temp-lo { font-size: 13px; color: #7baaf7; margin-top: 2px; }
  .wx-card .wx-desc   { font-size: 11px; color: #8890aa; margin-top: 4px; text-align: center; line-height: 1.4; }
  .wx-card .wx-rain   { font-size: 11px; color: #7baaf7; margin-top: 3px; }
  .weather-loading { color: #556; font-size: 13px; text-align: center; padding: 2rem 0; line-height: 1.8; }

  /* ── 뉴스 ── */
  .news-layer { background: rgba(22,25,38,0.97); border-radius: 16px; padding: 1.1rem 1.25rem; border: 1px solid rgba(255,255,255,0.07); }
  .news-header { font-size: 12px; font-weight: 700; color: #556; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 12px; }
  .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
  .news-card { border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 11px 14px; cursor: pointer; transition: background 0.12s; background: rgba(255,255,255,0.02); }
  .news-card:hover { background: rgba(255,255,255,0.07); }
  .news-source { font-size: 11px; color: #03C75A; margin-bottom: 4px; font-weight: 600; }
  .news-title  { font-size: 13px; font-weight: 500; color: #c0c8e0; line-height: 1.5; }
  .news-time   { font-size: 11px; color: #445; margin-top: 5px; }
  .news-loading { color: #556; font-size: 13px; text-align: center; padding: 1.5rem 0; }

  /* ── 모달 ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: #1a1d26; border-radius: 18px; padding: 1.75rem; width: 360px; border: 1px solid #2e3245; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
  .modal-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 1.25rem; color: #e8eaf0; }
  .modal-box input { width: 100%; height: 42px; border-radius: 10px; border: 1px solid #2e3245; background: #13151e; padding: 0 14px; font-size: 14px; margin-bottom: 10px; color: #e8eaf0; outline: none; }
  .modal-box input::placeholder { color: #556; }
  .modal-box input:focus { border-color: #4285F4; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
  .modal-actions button { height: 38px; padding: 0 20px; border-radius: 10px; border: 1px solid #2e3245; background: #22253a; cursor: pointer; font-size: 13px; font-weight: 600; color: #aab0c8; }
  .modal-actions .btn-confirm { background: #4285F4; color: #fff; border-color: #4285F4; }
  .modal-actions .btn-confirm:hover { background: #3367d6; }
</style>
</head>
<body>
<div class="gateway">

  <!-- 시계 -->
  <div class="clock-layer">
    <div id="clock-line">
      <span id="clock-date"></span>
      <span id="clock-time"></span>
    </div>
  </div>

  <!-- 검색 -->
  <div class="search-layer">
    <input type="text" id="search-input" placeholder="검색어를 입력하세요..." />
    <button class="btn-search btn-naver" id="btn-naver">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      NAVER
    </button>
    <button class="btn-search btn-google" id="btn-google">
      <div class="google-dots"><span class="gd1"></span><span class="gd2"></span><span class="gd3"></span><span class="gd4"></span></div>
      Google
    </button>
  </div>

  <!-- 바로가기 -->
  <div class="shortcuts-layer">
    <div class="shortcuts-grid" id="shortcuts-grid"></div>
  </div>

  <!-- 날씨 -->
  <div class="bottom-col">
    <div class="weather-layer">
      <div id="weather-content"><div class="weather-loading">📍 위치 정보를 가져오는 중...</div></div>
    </div>

    <!-- 뉴스 -->
    <div class="news-layer">
      <div class="news-header">📰 네이버 뉴스</div>
      <div class="news-grid" id="news-list">
        <div class="news-loading">뉴스 불러오는 중...</div>
      </div>
    </div>
  </div>

</div>

<!-- 바로가기 추가 모달 -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-box">
    <h3>+ 바로가기 추가</h3>
    <input type="text" id="new-name" placeholder="이름 (예: 유튜브)" />
    <input type="text" id="new-url" placeholder="URL (예: https://youtube.com)" />
    <div class="modal-actions">
      <button id="btn-cancel">취소</button>
      <button class="btn-confirm" id="btn-confirm-add">추가</button>
    </div>
  </div>
</div>

<script>
// ── 네이버 API 키 ─────────────────────────────
const NAVER_CLIENT_ID     = 'YOUR_NAVER_CLIENT_ID';
const NAVER_CLIENT_SECRET = 'YOUR_NAVER_CLIENT_SECRET';

// ── 아이콘 SVG ────────────────────────────────
const SITE_ICONS = {
  naver:   `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="50" fill="#03C75A"/><text x="25" y="35" font-size="28" font-weight="900" font-family="Arial Black,sans-serif" text-anchor="middle" fill="white">N</text></svg>`,
  google:  `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="50" fill="#fff"/><path d="M25 22v6h8.5c-.4 2-1.5 3.7-3.1 4.8l4.9 3.8C38.3 33.3 40 29.4 40 25c0-1-.1-2-.3-3H25z" fill="#4285F4"/><path d="M13.6 29.8A14 14 0 0125 11.3c3.3 0 6.3 1.2 8.6 3.1L38 9.9C34.4 6.7 30 4.8 25 4.8 16 4.8 8.4 10.5 5.6 18.6l8 6.2z" fill="#34A853"/><path d="M5.6 18.6A14 14 0 005 25c0 2.3.4 4.5 1.1 6.5l7.8-6.1-.4-1.4-8-5.4z" fill="#FBBC05"/><path d="M25 39c4.9 0 9-1.6 12-4.4l-4.9-3.8c-2 1.3-4.5 2.1-7.1 2.1-5.3 0-9.9-3.6-11.5-8.5l-7.9 6.1C8.4 38.4 16 43.2 25 43.2z" fill="#EA4335"/></svg>`,
  youtube: `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="50" fill="#FF0000"/><path d="M38 25s0-4.2-.5-6.2c-.3-1.1-1.1-2-2.2-2.3C33.2 16 25 16 25 16s-8.2 0-10.3.5c-1.1.3-1.9 1.2-2.2 2.3C12 20.8 12 25 12 25s0 4.2.5 6.2c.3 1.1 1.1 2 2.2 2.3C16.8 34 25 34 25 34s8.2 0 10.3-.5c1.1-.3 1.9-1.2 2.2-2.3C38 29.2 38 25 38 25z" fill="white"/><polygon points="22,21 22,29 30,25" fill="#FF0000"/></svg>`,
  kakao:   `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="50" fill="#FEE500"/><path d="M25 13c-7.7 0-14 4.7-14 10.4 0 3.7 2.5 7 6.2 8.9l-1.6 5.7 6.6-4.3c.9.1 1.8.2 2.8.2 7.7 0 14-4.7 14-10.5S32.7 13 25 13z" fill="#3C1E1E"/></svg>`,
  coupang: `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="50" fill="#E2124B"/><text x="25" y="33" font-size="10" font-weight="800" font-family="Arial,sans-serif" text-anchor="middle" fill="white">COUPANG</text></svg>`,
  cafe:    `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="50" fill="#03C75A"/><text x="25" y="34" font-size="12" font-weight="800" font-family="Arial,sans-serif" text-anchor="middle" fill="white">CAFE</text></svg>`,
  weather: `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="50" fill="#1d4ed8"/><text x="25" y="33" font-size="28" text-anchor="middle">⛅</text></svg>`,
  map:     `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="50" fill="#10B981"/><path d="M25 10c-5.5 0-10 4.5-10 10 0 7.5 10 20 10 20s10-12.5 10-20c0-5.5-4.5-10-10-10zm0 13.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7z" fill="white"/></svg>`,
  papago:  `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="50" fill="#00C73C"/><text x="14" y="30" font-size="15" font-weight="700" font-family="Arial,sans-serif" fill="white">A</text><text x="27" y="35" font-size="15" font-weight="700" font-family="Arial,sans-serif" fill="white">가</text></svg>`,
  github:  `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="50" fill="#24292F"/><path fill-rule="evenodd" clip-rule="evenodd" d="M25 10a15 15 0 00-4.74 29.23c.75.14 1.02-.33 1.02-.72v-2.8c-4.15.9-5.03-2-5.03-2-.68-1.72-1.66-2.18-1.66-2.18-1.36-.93.1-.91.1-.91 1.5.1 2.3 1.54 2.3 1.54 1.33 2.28 3.5 1.62 4.36 1.24.13-.97.52-1.62.95-1.99-3.32-.38-6.8-1.66-6.8-7.38 0-1.63.58-2.96 1.54-4.01-.15-.38-.67-1.9.15-3.96 0 0 1.26-.4 4.12 1.54a14.3 14.3 0 017.5 0c2.86-1.95 4.11-1.54 4.11-1.54.82 2.06.3 3.58.15 3.96.96 1.05 1.54 2.38 1.54 4.01 0 5.74-3.5 7-6.83 7.37.54.46 1.01 1.38 1.01 2.78v4.12c0 .4.27.87 1.03.72A15 15 0 0025 10z" fill="white"/></svg>`,
};
const EMOJI_FALLBACK = ['🌟','📌','🔖','💡','🎯','⚡','🌈','🔥','📎','🗂'];

// ── 바로가기 ──────────────────────────────────
const DEFAULT_SHORTCUTS = [
  {name:"네이버",   url:"https://naver.com",         iconKey:"naver"},
  {name:"구글",    url:"https://google.com",        iconKey:"google"},
  {name:"유튜브",  url:"https://youtube.com",       iconKey:"youtube"},
  {name:"카카오",  url:"https://kakao.com",         iconKey:"kakao"},
  {name:"쿠팡",    url:"https://coupang.com",       iconKey:"coupang"},
  {name:"카페",    url:"https://cafe.naver.com",    iconKey:"cafe"},
  {name:"날씨",    url:"https://weather.naver.com", iconKey:"weather"},
  {name:"지도",    url:"https://map.naver.com",     iconKey:"map"},
  {name:"파파고",  url:"https://papago.naver.com",  iconKey:"papago"},
  {name:"GitHub",  url:"https://github.com",        iconKey:"github"},
];
let shortcuts = JSON.parse(localStorage.getItem('gw_b2_sc') || 'null') || DEFAULT_SHORTCUTS;
function saveShortcuts(){ localStorage.setItem('gw_b2_sc', JSON.stringify(shortcuts)); }

function renderShortcuts(){
  const grid = document.getElementById('shortcuts-grid');
  grid.innerHTML = '';
  shortcuts.forEach((s,i)=>{
    const el = document.createElement('div');
    el.className = 'shortcut-item';
    const iconHtml = s.iconKey && SITE_ICONS[s.iconKey] ? SITE_ICONS[s.iconKey]
      : `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="50" fill="#22253a"/><text x="25" y="33" font-size="22" text-anchor="middle">${s.emoji||'🌐'}</text></svg>`;
    el.innerHTML = `
      <div class="shortcut-wrap">
        <div class="shortcut-icon">${iconHtml}</div>
        <button class="del-btn" aria-label="${s.name} 삭제">✕</button>
      </div>
      <div class="shortcut-label">${s.name}</div>`;
    el.querySelector('.shortcut-icon').addEventListener('click', ()=> window.open(s.url,'_blank','noopener'));
    el.querySelector('.del-btn').addEventListener('click', e=>{
      e.stopPropagation();
      if(confirm(`"${s.name}" 바로가기를 삭제할까요?`)){ shortcuts.splice(i,1); saveShortcuts(); renderShortcuts(); }
    });
    grid.appendChild(el);
  });
  const add = document.createElement('div');
  add.className = 'shortcut-item shortcut-add';
  add.innerHTML = `<div class="shortcut-wrap"><div class="shortcut-icon"><span class="shortcut-add-plus">＋</span></div></div><div class="shortcut-label">추가</div>`;
  add.addEventListener('click', ()=> document.getElementById('add-modal').classList.add('show'));
  grid.appendChild(add);
}

// ── 시계 ─────────────────────────────────────
const DAY_KR = ['일','월','화','수','목','금','토'];
function updateClock(){
  const n = new Date();
  document.getElementById('clock-date').textContent =
    `${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 (${DAY_KR[n.getDay()]})`;
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  const s = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000); updateClock();

// ── 검색 ─────────────────────────────────────
document.getElementById('search-input').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch('naver'); });
document.getElementById('btn-naver').addEventListener('click', ()=> doSearch('naver'));
document.getElementById('btn-google').addEventListener('click', ()=> doSearch('google'));
function doSearch(engine){
  const q = document.getElementById('search-input').value.trim();
  if(!q) return;
  const url = engine === 'naver'
    ? 'https://search.naver.com/search.naver?query=' + encodeURIComponent(q)
    : 'https://www.google.com/search?q=' + encodeURIComponent(q);
  window.open(url, '_blank', 'noopener');
}

// ── 모달 ─────────────────────────────────────
function closeModal(){ document.getElementById('add-modal').classList.remove('show'); document.getElementById('new-name').value=''; document.getElementById('new-url').value=''; }
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('add-modal').addEventListener('click', e=>{ if(e.target.id==='add-modal') closeModal(); });
document.getElementById('btn-confirm-add').addEventListener('click', ()=>{
  const name = document.getElementById('new-name').value.trim();
  let url = document.getElementById('new-url').value.trim();
  if(!name||!url){ alert('이름과 URL을 모두 입력해주세요.'); return; }
  if(!url.startsWith('http')) url = 'https://' + url;
  shortcuts.push({name, url, emoji: EMOJI_FALLBACK[Math.floor(Math.random()*EMOJI_FALLBACK.length)]});
  saveShortcuts(); renderShortcuts(); closeModal();
});

// ── 날씨 ─────────────────────────────────────
const WX_ICONS={0:'☀️',1:'🌤',2:'⛅',3:'🌥',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'❄️',80:'🌦',81:'🌧',82:'⛈',85:'🌨',86:'❄️',95:'⛈',96:'⛈',99:'⛈'};
const WX_DESC={0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',45:'안개',48:'짙은 안개',51:'이슬비',53:'이슬비',55:'이슬비',61:'약한 비',63:'비',65:'강한 비',71:'약한 눈',73:'눈',75:'강한 눈',80:'소나기',82:'폭우',95:'뇌우',99:'뇌우'};

function loadWeather(){
  if(!navigator.geolocation){ document.getElementById('weather-content').innerHTML='<div class="weather-loading">위치 서비스를 지원하지 않습니다.</div>'; return; }
  navigator.geolocation.getCurrentPosition(async pos=>{
    const {latitude:lat, longitude:lon} = pos.coords;
    try{
      let city = '현재 위치';
      try{
        const gr = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const gd = await gr.json();
        city = gd.address.city || gd.address.town || gd.address.county || '현재 위치';
      }catch(e){}

      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,apparent_temperature&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FSeoul&forecast_days=8`);
      const d = await res.json();
      const c = d.current, dl = d.daily;
      const now = new Date();

      let html = `<div class="weather-scroll">`;
      // 오늘
      html += `<div class="wx-card today">
        <div class="wx-label">오늘</div>
        <div class="wx-date">${now.getMonth()+1}/${now.getDate()} (${DAY_KR[now.getDay()]})</div>
        <div class="wx-emoji">${WX_ICONS[c.weathercode]||'🌡'}</div>
        <div class="wx-temp-hi">${Math.round(c.temperature_2m)}°C</div>
        <div class="wx-temp-lo">체감 ${Math.round(c.apparent_temperature)}°</div>
        <div class="wx-desc">${WX_DESC[c.weathercode]||''}</div>
        <div class="wx-rain">📍 ${city}</div>
      </div>`;
      // 주간
      for(let i=1;i<8;i++){
        const dt = new Date(dl.time[i]);
        const lbl = i===1 ? '내일' : DAY_KR[dt.getDay()]+'요일';
        const wc = dl.weathercode[i];
        html += `<div class="wx-card">
          <div class="wx-label">${lbl}</div>
          <div class="wx-date">${dt.getMonth()+1}/${dt.getDate()}</div>
          <div class="wx-emoji">${WX_ICONS[wc]||'🌡'}</div>
          <div class="wx-temp-hi">${Math.round(dl.temperature_2m_max[i])}°</div>
          <div class="wx-temp-lo">${Math.round(dl.temperature_2m_min[i])}°</div>
          <div class="wx-desc">${WX_DESC[wc]||''}</div>
          <div class="wx-rain">💧${dl.precipitation_probability_max[i]}%</div>
        </div>`;
      }
      html += `</div>`;
      document.getElementById('weather-content').innerHTML = html;
    }catch(e){
      document.getElementById('weather-content').innerHTML = '<div class="weather-loading">날씨 정보를 불러오지 못했습니다.</div>';
    }
  },()=>{
    document.getElementById('weather-content').innerHTML = '<div class="weather-loading">위치 권한이 거부되었습니다.<br><small>브라우저 주소창 옆 자물쇠 아이콘에서 위치 접근을 허용해주세요.</small></div>';
  });
}

// ── 뉴스 ─────────────────────────────────────
async function loadNews(){
  const list = document.getElementById('news-list');

  if(NAVER_CLIENT_ID === 'YOUR_NAVER_CLIENT_ID'){
    loadNewsFallback(list); return;
  }
  try{
    const apiUrl = `https://openapi.naver.com/v1/search/news.json?query=뉴스&display=10&sort=date`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;
    const res = await fetch(proxyUrl, {
      headers:{
        'X-Naver-Client-Id': NAVER_CLIENT_ID,
        'X-Naver-Client-Secret': NAVER_CLIENT_SECRET
      }
    });
    const raw = await res.json();
    const data = JSON.parse(raw.contents);
    if(!data.items||!data.items.length) throw new Error('empty');
    list.innerHTML = '';
    data.items.forEach(item=>{
      const title = item.title.replace(/<[^>]+>/g,'');
      const pub = new Date(item.pubDate).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
      const card = document.createElement('div'); card.className = 'news-card';
      card.innerHTML = `<div class="news-source">네이버 뉴스</div><div class="news-title">${title}</div><div class="news-time">${pub}</div>`;
      card.addEventListener('click', ()=> window.open(item.link,'_blank','noopener'));
      list.appendChild(card);
    });
  }catch(e){ loadNewsFallback(list); }
}

async function loadNewsFallback(list){
  try{
    const rss = 'https://news.google.com/rss/search?q=한국+뉴스&hl=ko&gl=KR&ceid=KR:ko';
    const res = await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(rss));
    const data = await res.json();
    const xml = new DOMParser().parseFromString(data.contents,'text/xml');
    const items = Array.from(xml.querySelectorAll('item')).slice(0,10);
    if(!items.length) throw new Error('empty');
    list.innerHTML = '';
    items.forEach(item=>{
      const title  = item.querySelector('title')?.textContent || '';
      const link   = item.querySelector('link')?.textContent  || '#';
      const pub    = item.querySelector('pubDate')?.textContent || '';
      const source = item.querySelector('source')?.textContent || '뉴스';
      const t = pub ? new Date(pub).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
      const card = document.createElement('div'); card.className = 'news-card';
      card.innerHTML = `<div class="news-source">${source}</div><div class="news-title">${title}</div><div class="news-time">${t}</div>`;
      card.addEventListener('click', ()=> window.open(link,'_blank','noopener'));
      list.appendChild(card);
    });
  }catch(e){
    list.innerHTML = '<div class="news-loading">뉴스를 불러오지 못했습니다.</div>';
  }
}

renderShortcuts(); loadWeather(); loadNews();
